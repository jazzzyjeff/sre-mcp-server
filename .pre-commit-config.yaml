---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: check-json
        stages: [pre-commit]
      - id: check-yaml
        stages: [pre-commit]
        args:
          - --unsafe
      - id: check-symlinks
        stages: [pre-commit]
      - id: check-added-large-files
        stages: [pre-commit]
        args:
          - --maxkb=15000
      - id: detect-private-key
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: uv-black
        name: uv black
        entry: uv run black
        language: system
        pass_filenames: true
        types: [python]

      - id: uv-pylint
        name: uv pylint
        entry: uv run pylint .
        language: system
        pass_filenames: false
        types: [python]

      - id: uv-mypy
        name: uv mypy
        entry: uv run mypy
        language: system
        pass_filenames: true
        types: [python]
